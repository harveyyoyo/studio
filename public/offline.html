<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Arcade Rewards</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f1f5f9;
            color: #1e293b;
            text-align: center;
            padding: 1rem;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #435EBE;
        }
        p {
            font-size: 1.1rem;
            color: #475569;
            margin-bottom: 2rem;
        }
        .button {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            background-color: #435EBE;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }
        .button:hover {
            background-color: #354a9f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>You're Currently Offline</h1>
        <p>It seems you've lost your internet connection. Don't worry, some parts of the app may still be available. Please check your connection and try again.</p>
        <a href="/" class="button">Try Reloading</a>
    </div>
</body>
</html>
